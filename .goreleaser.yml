version: 2

project_name: sf

before:
  hooks:
    - go mod tidy

builds:
  - id: sf
    main: ./cmd/sf
    binary: sf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/sofia-ctx/sofia/internal/version.Version={{ .Version }}

archives:
  - id: sf
    ids: [sf]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: sofia-ctx
    name: sofia

# Homebrew tap is intentionally not wired up yet: it needs a
# sofia-ctx/homebrew-tap repo (not created — that's a separate, deliberate
# step, not something to spin up automatically off a build) plus a
# HOMEBREW_TAP_GITHUB_TOKEN secret. Re-add a homebrew_casks block pointing at
# it once both exist:
#
# homebrew_casks:
#   - name: sf
#     ids: [sf]
#     binaries: [sf]
#     repository:
#       owner: sofia-ctx
#       name: homebrew-tap
#     homepage: "https://github.com/sofia-ctx/sofia"
#     description: "Structural code context for LLM coding agents — the sf CLI"
