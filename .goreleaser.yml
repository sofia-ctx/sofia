version: 2

project_name: sf

before:
  hooks:
    - go mod tidy

builds:
  - id: sf
    main: ./cmd/sf
    binary: sf
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/sofia-ctx/sofia/internal/version.Version={{ .Version }}

archives:
  - id: sf
    ids: [sf]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: sofia-ctx
    name: sofia

homebrew_casks:
  - name: sf
    ids: [sf]
    binaries: [sf]
    repository:
      owner: sofia-ctx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/sofia-ctx/sofia"
    description: "Structural code context for LLM coding agents — the sf CLI"
